<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00ff00; cursor: pointer; text-align: center; font-family: monospace;">
        <div style="padding: 20px; border: 2px solid #00ff00;">ЗАПУСТИТИ СКАНЕР</div>
        <p style="font-size: 12px; margin-top: 10px;">Натисни тут і наводь на стікер</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-logic" mindar-image-target="targetIndex: 0">
            <a-entity line="start: -0.5 0.8 0; end: 0.5 0.8 0; color: red"
                      line__2="start: -0.5 -0.8 0; end: 0.5 -0.8 0; color: red"
                      line__3="start: -0.5 0.8 0; end: -0.5 -0.8 0; color: red"
                      line__4="start: 0.5 0.8 0; end: 0.5 -0.8 0; color: red">
            </a-entity>
            
            <a-entity position="0 1 0">
                <a-plane color="black" width="1.5" height="0.3"></a-plane>
                <a-text id="status-text" value="SCANNING..." color="#00ff00" align="center" width="4"></a-text>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const phrases = [
            "ПОРУШНИК: БЕЗ КАСКИ",
            "ОБ'ЄКТ В БЕЗПЕЦІ ✅",
            "ШТРАФ: 1000 ГРН",
            "ДЕ ЖУРНАЛ?!",
            "ГОЛОВНИЙ ПОРУШНИК",
            "СУПЕР-ІНЖЕНЕР 🛠️"
        ];

        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const targetLogic = document.getElementById('target-logic');

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            // Спроба "штовхнути" сцену для iPhone
            const sceneEl = document.querySelector('a-scene');
            sceneEl.play();
        });

        targetLogic.addEventListener("targetFound", () => {
            const randomIdx = Math.floor(Math.random() * phrases.length);
            statusText.setAttribute('value', phrases[randomIdx]);
        });
    </script>
</body>
</html>
