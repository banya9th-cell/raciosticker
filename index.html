<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #00ff00; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; text-align: center; padding: 20px;
        }
        .btn { padding: 15px 30px; border: 2px solid #00ff00; background: none; color: #00ff00; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="btn">ЗАПУСТИТИ СКАНЕР ПОРУШНИКІВ</div>
        <p>Увімкни фронтальну камеру, коли запитає</p>
    </div>

    <video id="selfieVideo" playsinline style="display:none"></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-plane color="#ff0000" width="1.05" height="1.55" position="0 0 0"></a-plane>
            
            <a-video id="mirror-plane" width="1" height="1.5" position="0 0 0.01"></a-video>
            
            <a-entity position="0 0.9 0.1">
                <a-plane color="black" width="1.2" height="0.3" opacity="0.8"></a-plane>
                <a-text id="random-text" value="ШУКАЮ ПОРУШНИКА..." color="yellow" align="center" width="2"></a-text>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const phrases = [
            "ШТРАФ: 500 грн (БЕЗ КАСКИ)",
            "ПОРУШНИК ТИЖНЯ!",
            "ДЕ ЖУРНАЛ ІНСТРУКТАЖУ?!",
            "БОНУС: +1 ДЕНЬ ДО ВІДПУСТКИ",
            "ВИПИЙ КАВИ ТА ВДЯГНИ ЖИЛЕТ",
            "ГОЛОВНИЙ ІНЖЕНЕР ПИШАЄТЬСЯ ТОБОЮ",
            "ОБЕРЕЖНО: ГЕНІЙ ОХОРОНИ ПРАЦІ"
        ];

        const overlay = document.getElementById('overlay');
        const selfieVideo = document.getElementById('selfieVideo');
        const mirrorPlane = document.getElementById('mirror-plane');
        const randomText = document.getElementById('random-text');
        const target = document.getElementById('target');

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            
            // Запускаємо селфі-камеру
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                selfieVideo.srcObject = stream;
                selfieVideo.play();
                mirrorPlane.setAttribute('src', '#selfieVideo');
            })
            .catch(err => alert("Потрібен доступ до фронтальної камери!"));
        });

        // Коли знайшли стікер - міняємо фразу
        target.addEventListener("targetFound", () => {
            const randomIndex = Math.floor(Math.random() * phrases.length);
            randomText.setAttribute('value', phrases[randomIndex]);
        });
    </script>
</body>
</html>
